services:
  node-1:
    build: .
    ports:
      - "8081:8080"
    command: ["--server-port=8080", "--grpc-port=9080", "--peers=node-2:9080,node-3:9080", "--limit=10"]

  node-2:
    build: .
    ports:
      - "8082:8080"
    command: ["--server-port=8080", "--grpc-port=9080", "--peers=node-1:9080,node-3:9080", "--limit=10"]

  node-3:
    build: .
    ports:
      - "8083:8080"
    command: ["--server-port=8080", "--grpc-port=9080", "--peers=node-1:9080,node-2:9080", "--limit=10"]